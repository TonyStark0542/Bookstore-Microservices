version: '3.8'

services:
  # TIER 1: The Secure Database Engine
  mongodb-backend:
    image: mongo:4.4.18
    container_name: mongodb-backend
    restart: always
    volumes:
      - ./backend/database_backup:/backup
    networks:
      - bookstore-mesh

  # TIER 2: Headless Data & GenAI Brain
  bookstore-backend:
    build: ./backend  # Points directly to the backend subfolder Dockerfile
    container_name: bookstore-backend-service
    restart: always
    environment:
      - MONGO_URI=mongodb://mongodb-backend:27017/bookstore
      # ONLY the backend receives the decoupled Gemini credential!
      - GEMINI_API_KEY
    networks:
      - bookstore-mesh
    depends_on:
      mongodb-backend:
        condition: service_started # Standard wait condition

  # TIER 3: The Public Presentation Layer
  bookstore-frontend:
    build: ./frontend # Points directly to the frontend subfolder Dockerfile
    container_name: bookstore-frontend-service
    restart: always
    ports:
      - "5000:5000"
    environment:
      - CATALOG_API_URL=http://bookstore-backend:8000
    networks:
      - bookstore-mesh
    depends_on:
      - bookstore-backend

networks:
  bookstore-mesh:
    driver: bridge